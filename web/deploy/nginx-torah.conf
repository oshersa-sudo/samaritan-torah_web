# nginx reverse proxy for the Samaritan Torah web app.
# Copy to /etc/nginx/sites-available/torah and enable:
#   sudo cp web/deploy/nginx-torah.conf /etc/nginx/sites-available/torah
#   sudo ln -s /etc/nginx/sites-available/torah /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see DEPLOY.md) to add HTTPS — it rewrites this file for you.

server {
    listen 80;
    listen [::]:80;
    server_name torah.the-samaritans.net;   # ← your sub-domain

    # serve the static assets directly from nginx (faster than through gunicorn)
    location /static/ {
        alias /var/www/samaritan-torah/web/static/;
        expires 7d;
        access_log off;
    }
    location /fonts/ {
        alias /var/www/samaritan-torah/web/static/fonts/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 2m;
}
